name: Confirmar Deploy Oracle
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -m 15 "https://api.168.138.232.237.sslip.io/health" -w "\nHTTP_CODE:%{http_code}\n" > backups/confirmar-deploy.txt 2>&1
          cat backups/confirmar-deploy.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/confirmar-deploy.txt
          git diff --quiet --cached || git commit -m "confirmar deploy [skip ci]"
          git push
