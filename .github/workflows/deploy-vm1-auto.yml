name: Deploy Backend VM1 (auto)
on:
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + restart)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 168.138.232.237
          username: ubuntu
          key: ${{ secrets.ORACLE_VM1_SSH_KEY }}
          script: |
            cd ~/painel-falhas
            git pull
            sudo systemctl restart painel-falhas
            sleep 3
            sudo systemctl status painel-falhas --no-pager
