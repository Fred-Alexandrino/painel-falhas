name: Deploy Backend VM1 (auto)
on:
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check git state
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 168.138.232.237
          username: ubuntu
          key: ${{ secrets.ORACLE_VM1_SSH_KEY }}
          script: |
            cd ~/painel-falhas
            echo "=== git status ==="
            git status
            echo "=== git log -3 ==="
            git log --oneline -3
            echo "=== git pull output ==="
            git pull
            echo "=== git log -3 after pull ==="
            git log --oneline -3
            echo "=== grep for exportar-semana in app.py ==="
            grep -c "zeladoria-fotos-exportar-semana" app.py || echo "NOT FOUND"
            echo "=== service status ==="
            sudo systemctl status painel-falhas --no-pager | head -20
