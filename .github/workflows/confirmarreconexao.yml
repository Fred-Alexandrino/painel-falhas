name: Confirmar Reconexao
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://wppconnect-painel.onrender.com/health" --max-time 20 -o backups/reconexao.json
          cat backups/reconexao.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/reconexao.json
          git diff --quiet --cached || git commit -m "confirmar reconexao [skip ci]"
          git push
