name: Investigar Status e Botao
on:
  workflow_dispatch: {}
jobs:
  i:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          echo "=== Auditoria de consistencia (sem aplicar, so listar) ===" > backups/investigar.txt
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/auditoria-consistencia-os?apply=false" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 40 -o /tmp/aud.json
          python3 -c "
          import json
          d = json.load(open('/tmp/aud.json'))
          print('total_divergencias:', d.get('total_divergencias'))
          for div in d.get('divergencias', []):
              print(div)
          "  >> backups/investigar.txt
          echo "" >> backups/investigar.txt
          echo "=== Testando botao Atualizar OS (atualizar-os-agora) ===" >> backups/investigar.txt
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" --max-time 60 -o /tmp/aos.json -w "\nHTTP_CODE:%{http_code}\n"
          END=$(date +%s)
          cat /tmp/aos.json >> backups/investigar.txt
          echo "duracao: $((END-START))s" >> backups/investigar.txt
          cat backups/investigar.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/investigar.txt
          git diff --quiet --cached || git commit -m "investigar [skip ci]"
          git push
