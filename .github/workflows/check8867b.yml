name: Check 8867 Detalhado
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') == '8867':
                  print('historico completo:')
                  print(a.get('historico'))
          " > backups/check8867b.txt
          cat backups/check8867b.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check8867b.txt
          git diff --quiet --cached || git commit -m "check 8867b [skip ci]"
          git push
