name: Check 9396
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('id') == '139':
                  print(json.dumps(a, ensure_ascii=False, indent=2))
          " > backups/check9396-interno.txt
          cat backups/check9396-interno.txt
          echo "" >> backups/check9396-interno.txt
          echo "=== dado bruto direto na Fracttal ===" >> backups/check9396-interno.txt
          curl -s "https://whatsapp-painel-falhas.onrender.com/fracttal-raw?folio=9396" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/raw.json
          python3 -c "
          import json
          d = json.load(open('/tmp/raw.json'))
          body = d.get('body')
          if isinstance(body, dict) and body.get('data'):
              tasks = body['data']
              print('total tasks:', len(tasks))
              for t in tasks:
                  print('id_status_work_order:', t.get('id_status_work_order'), '| status_label:', t.get('status'), '| percent:', t.get('percent') or t.get('percentage'))
          else:
              print(json.dumps(d, ensure_ascii=False, indent=2)[:2000])
          " >> backups/check9396-interno.txt
          cat backups/check9396-interno.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check9396-interno.txt
          git diff --quiet --cached || git commit -m "check 9396 [skip ci]"
          git push
