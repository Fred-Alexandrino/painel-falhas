name: Teste Lote Notificacoes
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" --max-time 55 -o backups/teste-lote.json
          python3 -c "
          import json
          d = json.load(open('backups/teste-lote.json'))
          print('ok:', d.get('ok'))
          print('revalidadas:', len(d.get('revalidadas_ao_vivo',[])))
          print('divergencias:', d.get('total_divergencias'))
          " > backups/resumo-lote.txt
          cat backups/resumo-lote.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resumo-lote.txt
          git diff --quiet --cached || git commit -m "teste lote [skip ci]"
          git push
