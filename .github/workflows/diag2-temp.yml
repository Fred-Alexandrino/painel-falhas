name: Diag Config Ler Temp 2
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Buscar atividades
        run: |
          mkdir -p backups
          curl -s --max-time 25 "https://api.168.138.232.237.sslip.io/atividades" -o backups/diag-atividades.json
      - if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          python3 -c "
import json
d = json.load(open('backups/diag-atividades.json', encoding='utf-8'))
out = [a for a in d.get('atividades', []) if a.get('numeroOS') in ('9722','9991','8508','8626')]
json.dump(out, open('backups/diag-atividades-filtro.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)
"
          git add backups/diag-atividades-filtro.json
          git diff --quiet --cached || git commit -m "diag atividades filtro temp [skip ci]"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-atividades-filtro.json
          git commit -m "diag atividades filtro temp [skip ci]" || echo "nothing2"
          git push origin HEAD:main
