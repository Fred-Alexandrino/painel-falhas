name: Atualizar Chave Gemini
on:
  workflow_dispatch: {}
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar .env via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 168.138.232.237
          username: ubuntu
          key: ${{ secrets.ORACLE_VM1_SSH_KEY }}
          envs: NOVA_CHAVE
          script: |
            cd ~/painel-falhas
            cp .env .env.bak-$(date +%Y%m%d-%H%M%S)
            sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${NOVA_CHAVE}|" .env
            grep -c "GEMINI_API_KEY=" .env
            sudo systemctl restart painel-falhas
            sleep 3
            sudo systemctl status painel-falhas --no-pager | head -5
        env:
          NOVA_CHAVE: ${{ secrets.GEMINI_TESTE_NOVA_CHAVE }}
