name: Teste Varredura Ampla
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" \
            -o backups/teste-varredura-result.json --max-time 100
          END=$(date +%s)
          echo "" >> backups/teste-varredura-result.json
          echo "duracao_segundos: $((END-START))" >> backups/teste-varredura-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-varredura-result.json
          git diff --quiet --cached || git commit -m "teste varredura ampla [skip ci]"
          git push
