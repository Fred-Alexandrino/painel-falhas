name: Teste Diag 31
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          R1=$(curl -s -m 30 "https://api.168.138.232.237.sslip.io/diag-testar-modelo-gemini?modelo=gemini-3.1-flash-lite&chave=teste")
          R2=$(curl -s -m 30 "https://api.168.138.232.237.sslip.io/diag-testar-modelo-gemini?modelo=gemini-2.5-flash&chave=teste")
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "DIAG31=[${R1:0:400}] DIAG25=[${R2:0:200}]"
          git push
