name: Get WPP URL
on:
  workflow_dispatch: {}
jobs:
  geturl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/health" -o backups/health-wpp-url.json
          cat backups/health-wpp-url.json
      - if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/health-wpp-url.json
          git diff --quiet --cached || git commit -m "wpp url [skip ci]"
          git push
