name: Checar DataCriacao (temp)
on:
  workflow_dispatch: {}
jobs:
  checar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/atividades" -o backups/check_datacriacao.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/check_datacriacao.json
          git diff --quiet --cached || git commit -m "check datacriacao [skip ci]"
          git push
