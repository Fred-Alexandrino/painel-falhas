name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://raw.githubusercontent.com/Fred-Alexandrino/painel-falhas/main/backups/last-sync-fracttal.txt" -o backups/diag-last-sync.txt || echo "sem arquivo" > backups/diag-last-sync.txt
          curl -s "https://whatsapp-painel-falhas.onrender.com/health" -o backups/diag-health.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-last-sync.txt backups/diag-health.json
          git diff --quiet --cached || git commit -m "diagnostico sync [skip ci]"
          git push
