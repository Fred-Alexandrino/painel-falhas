name: Check 8867
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') == '8867':
                  print(json.dumps(a, ensure_ascii=False, indent=2))
          " > backups/check8867.txt
          echo '' >> backups/check8867.txt
          echo '=== dado bruto Fracttal ===' >> backups/check8867.txt
          curl -s "https://whatsapp-painel-falhas.onrender.com/fracttal-raw?folio=8867" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/raw.json
          python3 -c "
          import json
          d = json.load(open('/tmp/raw.json'))
          body = d.get('body')
          if isinstance(body, dict) and body.get('data'):
              for t in body['data']:
                  print('id_status_work_order:', t.get('id_status_work_order'), '| percent:', t.get('percent') or t.get('percentage'))
          else:
              print(str(d)[:1500])
          " >> backups/check8867.txt
          cat backups/check8867.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check8867.txt
          git diff --quiet --cached || git commit -m "check 8867 [skip ci]"
          git push
