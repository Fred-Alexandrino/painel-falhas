name: Fixar 9251
on:
  workflow_dispatch: {}
jobs:
  f:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"numeroOS":"9251","field":"status","value":"Cancelado"}' \
            -o backups/fixar-9251-result.json
          cat backups/fixar-9251-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/fixar-9251-result.json
          git diff --quiet --cached || git commit -m "fixar 9251 [skip ci]"
          git push
