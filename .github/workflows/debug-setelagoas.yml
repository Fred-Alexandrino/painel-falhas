name: Debug Sete Lagoas e OS 8945

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Checar dados
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          print('===== OS 8945 =====')
          for a in ativs:
              if a.get('numeroOS') == '8945':
                  print(a)
          print()
          print('===== USINAS COM SETE LAGOAS =====')
          usinas = set()
          for a in ativs:
              if 'sete lagoas' in (a.get('usina') or '').lower():
                  usinas.add(a.get('usina'))
          for u in usinas:
              print(repr(u))
          " > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug Sete Lagoas [skip ci]"
          git push
