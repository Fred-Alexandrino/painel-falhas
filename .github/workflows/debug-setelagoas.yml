name: Debug Sete Lagoas e OS 8945

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Buscar status real da OS 8945
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/fracttal-raw?folio=8945" -H "X-Webhook-Secret: $WEBHOOK_SECRET" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          t = d['body']['data'][0]
          print('id_status_work_order:', t.get('id_status_work_order'))
          " > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug Sete Lagoas [skip ci]"
          git push
