name: Debug Sete Lagoas e OS 8945

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Rodar normalizar-usinas-clientes
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s -X POST "$BASE/normalizar-usinas-clientes" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 100 > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug Sete Lagoas [skip ci]"
          git push
