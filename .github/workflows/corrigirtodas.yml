name: Corrigir DataConclusao Todas
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          declare -A MAP=( [28]="08/07/2026 10:16:00" [31]="09/07/2026 09:08:00" [53]="09/07/2026 09:30:00" [112]="09/07/2026 10:14:00" [113]="09/07/2026 10:13:00" [115]="12/07/2026 01:27:00" [116]="13/07/2026 13:30:00" [117]="12/07/2026 12:35:00" [122]="12/07/2026 12:23:00" [125]="13/07/2026 12:25:00" [127]="13/07/2026 11:57:00" [128]="13/07/2026 11:57:00" [131]="12/07/2026 12:36:00" )
          echo "resultado:" > backups/corrigir-todas.txt
          for id in "${!MAP[@]}"; do
            valor="${MAP[$id]}"
            payload=$(python3 -c "import json; print(json.dumps({'id':'$id','field':'dataConclusao','value':'$valor'}))")
            resultado=$(curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" -d "$payload")
            echo "id=$id -> $resultado" >> backups/corrigir-todas.txt
            sleep 1
          done
          cat backups/corrigir-todas.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/corrigir-todas.txt
          git diff --quiet --cached || git commit -m "corrigir todas dataconclusao [skip ci]"
          git push
