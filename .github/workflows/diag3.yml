name: Diagnostico Comunicado Cluster
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -i -X POST "https://api.168.138.232.237.sslip.io/disparar-comunicado-cluster" \
            -H "Content-Type: application/json" \
            -d '{"cluster":"__DIAG_TESTE__","texto":"teste diagnostico"}' \
            -o backups/diag-comunicado-cluster.txt \
            --max-time 40
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/diag-comunicado-cluster.txt
          git diff --quiet --cached || git commit -m "diag comunicado cluster [skip ci]"
          git push
