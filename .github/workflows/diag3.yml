name: Diag3
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          echo "=== forcando chave de teste ===" > backups/diag3.txt
          curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste"}' >> backups/diag3.txt
          echo "" >> backups/diag3.txt
          echo "=== chamada normal ===" >> backups/diag3.txt
          curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"teste diagnostico"}' >> backups/diag3.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag3.txt
          git commit -m "diag3 [skip ci]"
          n=0
          until git push || [ $n -ge 6 ]; do
            n=$((n+1))
            sleep 4
            git pull --rebase origin main
          done
