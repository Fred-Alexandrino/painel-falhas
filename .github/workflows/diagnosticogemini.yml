name: Diagnostico Gemini
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== gerar-texto-os-ia com diagnostico=true (forca chave de teste) ===" >> $GITHUB_STEP_SUMMARY
          curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== gerar-comunicado-livre-ia normal (chave principal + fallback automatico) ===" >> $GITHUB_STEP_SUMMARY
          curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"teste diagnostico"}' >> $GITHUB_STEP_SUMMARY
