name: Teste PWA 2
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          M=$(curl -s -o /dev/null -w "%{http_code}|%{content_type}" "https://fred-alexandrino.github.io/PAINELDEFALHAS/manifest.json")
          I1=$(curl -s -o /dev/null -w "%{http_code}|%{content_type}|%{size_download}" "https://fred-alexandrino.github.io/PAINELDEFALHAS/icon-192.png")
          I2=$(curl -s -o /dev/null -w "%{http_code}|%{content_type}|%{size_download}" "https://fred-alexandrino.github.io/PAINELDEFALHAS/icon-512.png")
          MC=$(curl -s "https://fred-alexandrino.github.io/PAINELDEFALHAS/manifest.json" | head -c 300)
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "PWARESULT manifest=[$M] icon192=[$I1] icon512=[$I2] manifestConteudo=[$MC]"
          git push
