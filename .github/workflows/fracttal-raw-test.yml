name: Fracttal Raw Diagnostic (temporario)

on:
  workflow_dispatch: {}

jobs:
  raw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Chamar /completar-fracttal-backfill em lotes
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          > backups/fracttal-raw-sample.txt

          for TENTATIVA in 1 2 3 4 5 6; do
            echo "===== Lote $TENTATIVA =====" >> backups/fracttal-raw-sample.txt
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 100 -X POST "$BASE/completar-fracttal-backfill?limit=8" \
              -H "X-Webhook-Secret: $WEBHOOK_SECRET")
            BODY=$(echo "$RESPONSE" | head -n -1)
            STATUS=$(echo "$RESPONSE" | tail -n 1)
            echo "Status HTTP: $STATUS" >> backups/fracttal-raw-sample.txt
            echo "$BODY" >> backups/fracttal-raw-sample.txt
            echo "" >> backups/fracttal-raw-sample.txt

            PROCESSADAS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('processadas_nesta_chamada', 0))" 2>/dev/null || echo 0)
            echo "Processadas neste lote: $PROCESSADAS"
            if [ "$PROCESSADAS" -eq "0" ]; then
              echo "Nada mais pra processar, encerrando."
              break
            fi
            sleep 15
          done

      - name: Salvar resultado no repositório
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/fracttal-raw-sample.txt
          git diff --quiet --cached || git commit -m "Resultado completar-fracttal-backfill em lotes [skip ci]"
          git push
