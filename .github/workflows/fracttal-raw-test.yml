name: Fracttal Raw Diagnostic (temporario)

on:
  workflow_dispatch: {}

jobs:
  raw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Checar atividades existentes (grep 9035 / 8467)
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            | python3 -c "
import json, sys
d = json.load(sys.stdin)
ativs = d.get('atividades', [])
for a in ativs:
    if '9035' in a.get('numeroOS','') or '8467' in a.get('numeroOS',''):
        print(a)
" > backups/fracttal-raw-sample.txt
          cat backups/fracttal-raw-sample.txt

      - name: Salvar resultado no repositório
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/fracttal-raw-sample.txt
          git diff --quiet --cached || git commit -m "Amostra raw da Fracttal [skip ci]"
          git push
