name: Teste Atualizar Corrigido
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" -o backups/teste-atualizar-fix.json --max-time 40
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('backups/teste-atualizar-fix.json'))
          print('ok:', d.get('ok'))
          print('total_desatualizadas (agora deveria ser 88, todas elegiveis):', d.get('total_desatualizadas'))
          print('revalidadas ao vivo:', len(d.get('revalidadas_ao_vivo',[])))
          print('divergencias:', d.get('total_divergencias'))
          " > backups/resumo-atualizar-fix.txt
          echo "duracao: $((END-START))s" >> backups/resumo-atualizar-fix.txt
          cat backups/resumo-atualizar-fix.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-atualizar-fix.json backups/resumo-atualizar-fix.txt
          git diff --quiet --cached || git commit -m "teste atualizar corrigido [skip ci]"
          git push
