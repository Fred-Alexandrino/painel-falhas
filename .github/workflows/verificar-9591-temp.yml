name: Verificar OS 9591 Crateus (temp)
on:
  workflow_dispatch: {}
jobs:
  verificar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -X POST "https://api.168.138.232.237.sslip.io/verificar-uma-os" \
            -H "Content-Type: application/json" \
            -d '{"numeroOS":"9591"}' -o backups/verificar-9591.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/verificar-9591.json
          git diff --quiet --cached || git commit -m "verificar OS 9591 [skip ci]"
          git push
