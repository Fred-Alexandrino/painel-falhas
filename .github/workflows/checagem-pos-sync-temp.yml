name: Checagem Pos Sync Local (temp)
on:
  workflow_dispatch: {}
jobs:
  checar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/chamados-fabricante" -o backups/pos_sync_local.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/pos_sync_local.json
          git diff --quiet --cached || git commit -m "check pos sync local [skip ci]"
          git push
