name: Check Dashboard OSs
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for numero in ('8025','9251','8605'):
              for a in ativs:
                  if a.get('numeroOS') == numero:
                      print('=== OS', numero, '===')
                      print('id:', a.get('id'))
                      print('usina:', a.get('usina'), '|', a.get('cliente'))
                      print('descricao:', a.get('descricao'))
                      print('status (interno):', a.get('status'))
                      print('statusOS (estado Fracttal):', a.get('statusOS'))
                      print('statusGeralOS:', a.get('statusGeralOS'))
                      print('percentualOS:', a.get('percentualOS'))
                      print('ultimaVerificacaoOS:', a.get('ultimaVerificacaoOS'))
                      print('prazo:', a.get('prazo'))
                      print()
          " > backups/check-dashboard.txt
          cat backups/check-dashboard.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-dashboard.txt
          git diff --quiet --cached || git commit -m "check dashboard os [skip ci]"
          git push
