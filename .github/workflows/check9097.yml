name: Check 9097
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') == '9097':
                  print(json.dumps(a, ensure_ascii=False, indent=2))
          " > backups/check9097.txt
          cat backups/check9097.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check9097.txt
          git diff --quiet --cached || git commit -m "check 9097 [skip ci]"
          git push
