name: Retomar UptimeRobot - Painel Falhas (manha)
on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 06:00 America/Fortaleza
  workflow_dispatch: {}
jobs:
  retomar:
    runs-on: ubuntu-latest
    steps:
      - env:
          UR_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
        run: |
          set -e
          for ID in 803376989 803473818; do
            RESP=$(curl -s -X POST "https://api.uptimerobot.com/v2/editMonitor" \
              -H "content-type: application/x-www-form-urlencoded" \
              -d "api_key=$UR_KEY&id=$ID&status=1&format=json")
            echo "Monitor $ID retomado: $RESP"
          done
