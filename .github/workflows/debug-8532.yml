name: Debug OS 8532

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Testar atualizar-campo-atividade diretamente
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s -X POST "$BASE/atualizar-campo-atividade" -H "Content-Type: application/json" \
            -d '{"id":"52","field":"statusTarefaOS","value":"5 Nao Iniciada, 3 Pausada, 17 Concluida","editor":"debug"}' \
            > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug OS 8626 [skip ci]"
          git push
