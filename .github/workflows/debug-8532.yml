name: Debug OS 8532

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Checar linkOS vazio
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          fracttal = [a for a in d.get('atividades', []) if a.get('editor') in ('fracttal-backfill','fracttal-sync')]
          sem_link = [a.get('numeroOS') for a in fracttal if not a.get('linkOS')]
          print('Total:', len(fracttal))
          print('Sem linkOS:', len(sem_link), sem_link)
          " > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug OS 8532 [skip ci]"
          git push
