name: Check Sete Lagoas 2
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = [a for a in d.get('atividades', []) if a.get('usina','').strip() == 'Sete Lagoas']
          print('total:', len(ativs))
          for a in ativs:
              print(json.dumps(a, ensure_ascii=False, indent=1))
          " > backups/sete-lagoas2.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/sete-lagoas2.txt
          git diff --quiet --cached || git commit -m "check sete lagoas 2 [skip ci]"
          git push
