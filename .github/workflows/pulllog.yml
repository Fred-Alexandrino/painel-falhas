name: Pull Log Completo
on:
  workflow_dispatch: {}
jobs:
  p:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/diag-grupos-log" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 30 -o backups/log-completo.json
          python3 -c "
          import json
          d = json.load(open('backups/log-completo.json'))
          print('grupos_filtro:', d.get('grupos_filtro'))
          print('total_grupos_filtro:', d.get('total_grupos_filtro'))
          print('total_linhas_log:', d.get('total_linhas_log'))
          msgs = d.get('todas_as_mensagens', [])
          # ids unicos de grupo que ja mandaram mensagem alguma vez
          ids_vistos = set()
          for m in msgs[1:]:
              if len(m) > 0:
                  ids_vistos.add(m[0])
          print('ids de grupo unicos no log:', sorted(ids_vistos))
          print()
          print('ultimas 5 linhas do log:')
          for m in msgs[-5:]:
              print(m[:3])
          " > backups/resumo-log.txt
          cat backups/resumo-log.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/log-completo.json backups/resumo-log.txt
          git diff --quiet --cached || git commit -m "pull log completo [skip ci]"
          git push
