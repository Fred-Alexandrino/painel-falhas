name: Status WPP
on:
  workflow_dispatch: {}
jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Status
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/health" -o /tmp/health.json
          WPP_URL=$(python3 -c "import json; print(json.load(open('/tmp/health.json')).get('wpp_server',''))")
          echo "WPP_URL=$WPP_URL"
          curl -s "$WPP_URL/status" -o backups/status-wpp.json
          cat backups/status-wpp.json
      - name: Salvar
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/status-wpp.json
          git diff --quiet --cached || git commit -m "status wpp [skip ci]"
          git push
