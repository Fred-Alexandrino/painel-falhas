name: Corrigir Tickets Empilhados (temp)
on:
  workflow_dispatch: {}
jobs:
  corrigir:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          curl -s -X POST "https://api.168.138.232.237.sslip.io/corrigir-tickets-empilhados" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            --data-binary @backups/correcoes_tickets_payload.json \
            --max-time 120 \
            -o backups/correcao_tickets_resultado.json
      - run: |
          git config user.name "fix-bot"
          git config user.email "actions@github.com"
          git add backups/correcao_tickets_resultado.json
          git diff --quiet --cached || git commit -m "resultado correcao tickets [skip ci]"
          git push
