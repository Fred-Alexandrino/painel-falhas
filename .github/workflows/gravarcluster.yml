name: Gravar Cluster
on:
  workflow_dispatch: {}
jobs:
  g:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/config-set-lote" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            --data @pares_cluster.json -o backups/gravar-cluster-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/gravar-cluster-result.json
          git diff --quiet --cached || git commit -m "gravar cluster [skip ci]"
          git push
