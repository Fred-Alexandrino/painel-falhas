name: Aplicar Correcao Fuso

on:
  workflow_dispatch: {}

jobs:
  aplicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar correcao de fuso (apply=true)
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/corrigir-fuso-retroativo?apply=true" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/apply-fuso-result.json
          python3 -c "
          import json
          d = json.load(open('backups/apply-fuso-result.json'))
          print('ok:', d.get('ok'))
          print('aplicado:', d.get('aplicado'))
          print('linhas_afetadas (corrigidas):', d.get('linhas_afetadas'))
          print('linhas ambiguas (nao mexidas):', len(d.get('ambiguos', [])))
          "
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/apply-fuso-result.json
          git diff --quiet --cached || git commit -m "Aplicacao correcao fuso [skip ci]"
          git push
