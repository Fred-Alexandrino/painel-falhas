name: Test Sync Direto
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sync-fracttal?secret=$WEBHOOK_SECRET" -o backups/sync-direto.json --max-time 40
          cat backups/sync-direto.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/sync-direto.json
          git diff --quiet --cached || git commit -m "test sync direto [skip ci]"
          git push
