name: Teste 31 Lite
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          R=$(curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste 3.1 flash lite"}')
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "TESTE31LITE=[${R:0:100}]"
          git push
      - run: |
          echo "isso so testa a chave, vou testar o modelo especifico direto no proximo passo com curl bruto"
