name: Teste Gemini Final
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"Teste de disponibilidade final","observacoes":""}' > backups/teste-final.txt
          cat backups/teste-final.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add backups/teste-final.txt
          git diff --quiet --cached || git commit -m "teste final [skip ci]"
          git push
