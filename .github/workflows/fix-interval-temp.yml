name: Fix Interval Sync-Fracttal (temp)
on:
  workflow_dispatch: {}
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - env:
          UR_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
        run: |
          set -e
          RESP=$(curl -s -X POST "https://api.uptimerobot.com/v2/editMonitor" \
            -H "content-type: application/x-www-form-urlencoded" \
            -d "api_key=$UR_KEY&id=803473818&interval=300&format=json")
          echo "Resultado: $RESP"
