name: Processar 9316
on:
  workflow_dispatch: {}
jobs:
  p:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          python3 << 'PYEOF'
          import json, os
          msg1 = """🔴 Usina: Ibaté II
* Problema: Inversor 7 desligado.
* Descrição dos Problemas: Inversor 7 desligado, falha de "Baixa impedância de isolamento".
* Impacto: 200KW
* Ação: Técnico acionado para verificação.
* Equipe Acionada: Sim, Andrick SP-1
* Supervisor Acionado: Sim, Vitor (Fred)
* Inicio ocorrência: 12/07/2026 - 12:30
* Fim ocorrência:
* Nº da OS: 9316"""
          json.dump({"texto": msg1}, open('/tmp/p1.json','w'))
          PYEOF
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/processar-texto-manual" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" \
            --data @/tmp/p1.json -o backups/processar-9316-msg1.json
          cat backups/processar-9316-msg1.json
          echo ""
          python3 << 'PYEOF'
          import json
          msg2 = """✅ Usina: Ibaté II Normalizado
* Problema: Inversor 7 desligado.
* Descrição dos Problemas: Inversor 7 desligado, falha de "Baixa impedância de isolamento".
* Impacto: 200KW
* Ação: Técnico acionado para verificação. Realizado reset, inversor normalizado.
* Equipe Acionada: Sim, Andrick
* Supervisor Acionado: Sim, Vitor (Fred)
* Inicio ocorrência: 12/07/2026 - 12:30
* Fim ocorrência: 12/07/2026 - 17:10
* Nº da OS: 9316"""
          json.dump({"texto": msg2}, open('/tmp/p2.json','w'))
          PYEOF
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/processar-texto-manual" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" \
            --data @/tmp/p2.json -o backups/processar-9316-msg2.json
          cat backups/processar-9316-msg2.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/processar-9316-msg1.json backups/processar-9316-msg2.json
          git diff --quiet --cached || git commit -m "processar 9316 [skip ci]"
          git push
