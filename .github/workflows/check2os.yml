name: Check 8025 9251
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') in ('8025','9251'):
                  print('OS', a.get('numeroOS'), '| id=', a.get('id'), '| status=', a.get('status'), '| statusOS=', a.get('statusOS'), '| ultimaVerificacaoOS=', a.get('ultimaVerificacaoOS'))
          " > backups/check2os.txt
          cat backups/check2os.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check2os.txt
          git diff --quiet --cached || git commit -m "check 2 os [skip ci]"
          git push
