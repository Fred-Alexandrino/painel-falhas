name: Check Visualizado 2
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          from collections import Counter
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          contagem = Counter(a.get('visualizado') for a in ativs)
          print('distribuicao:', dict(contagem))
          " > backups/check-visualizado2.txt
          cat backups/check-visualizado2.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-visualizado2.txt
          git diff --quiet --cached || git commit -m "check visualizado 2 [skip ci]"
          git push
