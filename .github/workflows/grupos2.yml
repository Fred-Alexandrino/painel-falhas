name: Grupos WhatsApp 2
on:
  workflow_dispatch: {}
jobs:
  g:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://wppconnect-painel.onrender.com/grupos" -o backups/grupos2.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/grupos2.json
          git diff --quiet --cached || git commit -m "grupos2 [skip ci]"
          git push
