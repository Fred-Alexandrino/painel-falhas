name: Check Piggyback
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sync-fracttal?secret=$WEBHOOK_SECRET" -o /tmp/sync-full.json
          python3 -c "
          import json
          d = json.load(open('/tmp/sync-full.json'))
          print('comunicados_check:', d.get('comunicados_check'))
          " > backups/check-piggyback.txt
          cat backups/check-piggyback.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-piggyback.txt
          git diff --quiet --cached || git commit -m "check piggyback [skip ci]"
          git push
