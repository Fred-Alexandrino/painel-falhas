name: Contar Abertas
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          com_os = [a for a in ativs if (a.get('numeroOS') or '').strip()]
          nao_finalizadas = [a for a in com_os if a.get('statusOS') not in ('Finalizada','Cancelada')]
          print('total com numeroOS:', len(com_os))
          print('nao finalizadas/canceladas (candidatas a checagem continua):', len(nao_finalizadas))
          " > backups/contar-abertas.txt
          cat backups/contar-abertas.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/contar-abertas.txt
          git diff --quiet --cached || git commit -m "contar abertas [skip ci]"
          git push
