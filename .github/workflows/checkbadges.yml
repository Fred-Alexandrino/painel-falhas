name: Check Badges Faltando
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          print('total:', len(ativs))
          problemas = []
          for a in ativs:
              status = (a.get('status') or '').strip()
              status_geral = (a.get('statusGeralOS') or '').strip()
              if status in ('Concluído','Cancelado'):
                  if not status_geral:
                      problemas.append((a.get('id'), a.get('numeroOS'), status, 'statusGeralOS VAZIO'))
                  elif status == 'Concluído' and 'conclu' not in status_geral.lower():
                      problemas.append((a.get('id'), a.get('numeroOS'), status, f'statusGeralOS={status_geral!r} nao bate'))
                  elif status == 'Cancelado' and 'cancel' not in status_geral.lower():
                      problemas.append((a.get('id'), a.get('numeroOS'), status, f'statusGeralOS={status_geral!r} nao bate'))
          print('total com problema:', len(problemas))
          for p in problemas:
              print(p)
          " > backups/check-badges.txt
          cat backups/check-badges.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-badges.txt
          git diff --quiet --cached || git commit -m "check badges [skip ci]"
          git push
