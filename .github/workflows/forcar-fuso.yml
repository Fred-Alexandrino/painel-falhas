name: Forcar Correcao Fuso Especifica

on:
  workflow_dispatch: {}

jobs:
  forcar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar correcao forcada em 9173 e 9154
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/corrigir-fuso-retroativo?apply=true&forcar=9173,9154" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/forcar-fuso-result.json
          cat backups/forcar-fuso-result.json
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/forcar-fuso-result.json
          git diff --quiet --cached || git commit -m "Forcar correcao fuso 9173/9154 [skip ci]"
          git push
