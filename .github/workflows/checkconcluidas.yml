name: Check Concluidas no Comunicado
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          # candidatas que teriam entrado no comunicado hoje (status interno != concluido/cancelado, statusOS != Em Revisao)
          suspeitas = []
          for a in ativs:
              status = (a.get('status') or '').strip().lower()
              status_os = (a.get('statusOS') or '').strip()
              if status in ('concluído','concluido','cancelado'):
                  continue
              if status_os == 'Em Revisão':
                  continue
              # candidatas ao comunicado -- checar se na verdade ja estao finalizadas na fracttal
              if status_os == 'Finalizada' or status_os == 'Cancelada':
                  suspeitas.append(a)
          print('total suspeitas (entrariam no comunicado mas estao Finalizada/Cancelada na Fracttal):', len(suspeitas))
          for a in suspeitas[:20]:
              print(a.get('numeroOS'), '|', a.get('usina'), '| status interno=', a.get('status'), '| statusOS=', a.get('statusOS'), '| ultimaVerificacaoOS=', a.get('ultimaVerificacaoOS'))
          " > backups/check-concluidas.txt
          cat backups/check-concluidas.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-concluidas.txt
          git diff --quiet --cached || git commit -m "check concluidas [skip ci]"
          git push
