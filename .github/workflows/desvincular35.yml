name: Desvincular 35
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"id":"35","field":"historico","value":"12/07/2026 - numeroOS/statusOS removidos: atividade retirada de circulacao (duplicata cancelada da OS 8866, ja mesclada na atividade #24). Nao deve mais ser sincronizada com a Fracttal.","append":"true"}' \
            -o backups/desvincular35-hist.json
          cat backups/desvincular35-hist.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/desvincular35-hist.json
          git diff --quiet --cached || git commit -m "desvincular 35 [skip ci]"
          git push
