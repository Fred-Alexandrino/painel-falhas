name: Diag Atividades (temporario)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Consulta /atividades e filtra OSs de interesse
        run: |
          curl -s https://api.168.138.232.237.sslip.io/atividades -o /tmp/atividades.json
          python3 -c "
import json
with open('/tmp/atividades.json') as f:
    d = json.load(f)
alvo_os = {'9721','9173','9741','9427'}
alvo = [a for a in d.get('atividades', []) if (a.get('numeroOS') or '').strip() in alvo_os]
with open('/tmp/diag_output.json','w') as f:
    json.dump(alvo, f, indent=2, ensure_ascii=False)
print(json.dumps(alvo, indent=2, ensure_ascii=False))
"
      - name: Salva snapshot em backups/
        run: |
          mkdir -p backups
          cp /tmp/diag_output.json "backups/diag_atividades_$(date +%Y%m%d_%H%M%S).json"
          git config user.name "diag-bot"
          git config user.email "diag-bot@users.noreply.github.com"
          git add backups/
          git commit -m "diag temporario: snapshot OS 9721/9173/9741/9427"
          git push
