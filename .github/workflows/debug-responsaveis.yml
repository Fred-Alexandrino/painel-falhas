name: Debug responsaveis duplicados

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Listar responsaveis unicos (repr)
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          nomes = set()
          for a in d.get('atividades', []):
              r = a.get('responsavel','')
              if 'rodolfo' in r.lower() or 'deivity' in r.lower():
                  nomes.add(r)
          for n in sorted(nomes):
              print(repr(n))
          " > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug responsaveis [skip ci]"
          git push
