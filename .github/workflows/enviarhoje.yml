name: Enviar Comunicados Hoje
on:
  workflow_dispatch: {}
jobs:
  e:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/enviar-comunicados-diarios" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 60 -o backups/enviar-hoje.json
          cat backups/enviar-hoje.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/enviar-hoje.json
          git diff --quiet --cached || git commit -m "enviar hoje [skip ci]"
          git push
