name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria_fotos/2026-W30/2026-W30_443144025d.jpg" > backups/diag-file1-status.txt
          curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria_fotos/2026-W30/2026-W30_4ea0999a09.jpg" > backups/diag-file2-status.txt
          curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria_fotos/2026-W30/2026-W30_e085ca348d.jpg" > backups/diag-file3-status.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-file1-status.txt backups/diag-file2-status.txt backups/diag-file3-status.txt
          git commit -m "diag sync [skip ci]" || echo "nothing"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-file1-status.txt backups/diag-file2-status.txt backups/diag-file3-status.txt
          git commit -m "diag sync [skip ci]" || echo "nothing2"
          git push origin HEAD:main
