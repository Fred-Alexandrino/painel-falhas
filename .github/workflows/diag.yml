name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -w "\nHTTP_STATUS:%{http_code}\nCONTENT_TYPE:%{content_type}\n" --max-time 20 "https://api.168.138.232.237.sslip.io/zeladoria-fotos-exportar-semana" -o backups/diag-export-body.bin
          curl -s -w "\nHTTP_STATUS:%{http_code}\nCONTENT_TYPE:%{content_type}\n" --max-time 20 "https://api.168.138.232.237.sslip.io/zeladoria-fotos-exportar-semana" > backups/diag-export-meta.txt
          curl -s --max-time 20 "https://api.168.138.232.237.sslip.io/health" -o backups/diag-export-health.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-export-body.bin backups/diag-export-meta.txt backups/diag-export-health.json
          git commit -m "diag sync [skip ci]" || echo "nothing"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-export-body.bin backups/diag-export-meta.txt backups/diag-export-health.json
          git commit -m "diag sync [skip ci]" || echo "nothing2"
          git push origin HEAD:main
