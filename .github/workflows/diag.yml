name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s --max-time 150 -X POST "https://api.168.138.232.237.sslip.io/zeladoria-processar-fotos-pendentes" -o backups/diag-r1.json
          curl -s --max-time 30 "https://api.168.138.232.237.sslip.io/zeladoria-fotos-status?mostrarConfirmadas=1" -o backups/diag-r2.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-r1.json backups/diag-r2.json
          git diff --quiet --cached || git commit -m "diag sync [skip ci]"
          git push
