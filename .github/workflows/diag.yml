name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -w "\nSTATUS:%{http_code}\n" --max-time 15 "https://api.168.138.232.237.sslip.io/health" -o backups/diag-health.txt
          curl -s -w "\nSTATUS:%{http_code}\n" --max-time 15 -X POST -H "Content-Type: application/json" \
            -d '{"ticket":"__diag_teste__","ufv":"__diag_teste__","equipamento":"__diag_teste__","novaObservacao":"teste automatico de diagnostico - pode ignorar"}' \
            "https://api.168.138.232.237.sslip.io/atualizar-observacao-chamado" -o backups/diag-nota-chamado.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-health.txt backups/diag-nota-chamado.txt
          git commit -m "diag sync [skip ci]" || echo "nothing"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-health.txt backups/diag-nota-chamado.txt
          git commit -m "diag sync [skip ci]" || echo "nothing2"
          git push origin HEAD:main
