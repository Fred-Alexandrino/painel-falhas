name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -w "\nHTTP_STATUS:%{http_code}\n" --max-time 110 -X POST "https://api.168.138.232.237.sslip.io/zeladoria-fotos-reclassificar-grau" -H "Content-Type: application/json" -d '{}' -o backups/diag-verify-recalc.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-verify-recalc.json
          git commit -m "diag sync [skip ci]" || echo "nothing to commit"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-verify-recalc.json
          git commit -m "diag sync [skip ci]" || echo "nothing to commit 2"
          git push origin HEAD:main
