name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(curl -s --max-time 100 -X POST "https://api.168.138.232.237.sslip.io/zeladoria-processar-fotos-pendentes")
          echo "$RESULT" | base64 -w0 > /tmp/encoded.txt
          CONTENT=$(cat /tmp/encoded.txt)
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/Fred-Alexandrino/painel-falhas/contents/backups/diag-api-result.json" \
            -d "{\"message\":\"diag via api [skip ci]\",\"content\":\"$CONTENT\"}"
