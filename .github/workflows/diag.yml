name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          echo "=== exportar-semana ===" > backups/diag-routes.txt
          curl -s -w "\nSTATUS:%{http_code}\n" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria-fotos-exportar-semana" >> backups/diag-routes.txt
          echo "=== config-limpar-cache ===" >> backups/diag-routes.txt
          curl -s -w "\nSTATUS:%{http_code}\n" -X POST --max-time 15 "https://api.168.138.232.237.sslip.io/config-limpar-cache?secret=$WEBHOOK_SECRET" >> backups/diag-routes.txt
          echo "=== zeladoria-debug-raw ===" >> backups/diag-routes.txt
          curl -s -w "\nSTATUS:%{http_code}\n" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria-debug-raw" >> backups/diag-routes.txt
          echo "=== zeladoria-fotos-status ===" >> backups/diag-routes.txt
          curl -s -w "\nSTATUS:%{http_code}\n" --max-time 15 "https://api.168.138.232.237.sslip.io/zeladoria-fotos-status" >> backups/diag-routes.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-routes.txt
          git commit -m "diag sync [skip ci]" || echo "nothing"
          git fetch origin main
          git reset --soft origin/main
          git add backups/diag-routes.txt
          git commit -m "diag sync [skip ci]" || echo "nothing2"
          git push origin HEAD:main
