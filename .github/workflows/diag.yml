name: Diagnostico Sync
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X POST "https://api.168.138.232.237.sslip.io/zeladoria-fotos-reclassificar-grau" \
            -H "Content-Type: application/json" -d '{}' -o backups/diag-recalc-grau.json --max-time 60
          echo "---" >> backups/diag-recalc-grau.json
          curl -s "https://api.168.138.232.237.sslip.io/zeladoria-fotos-status" -o backups/diag-fotos-status2.json
          curl -s "https://api.168.138.232.237.sslip.io/health" -o backups/diag-health2.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/diag-recalc-grau.json backups/diag-fotos-status2.json backups/diag-health2.json
          git diff --quiet --cached || git commit -m "diag sync [skip ci]"
          git push
