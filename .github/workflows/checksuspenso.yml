name: Check Servico Suspenso
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -w "\nHTTP_CODE:%{http_code}\n" "https://whatsapp-painel-falhas.onrender.com/health" --max-time 20 > backups/check-suspenso.txt
          cat backups/check-suspenso.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-suspenso.txt
          git diff --quiet --cached || git commit -m "check suspenso [skip ci]"
          git push
