name: Fix Pontual 9173 9154
on:
  workflow_dispatch: {}
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Chamar fix pontual
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          curl -s "$BASE/fix-pontual-9173-9154" -H "X-Webhook-Secret: $WEBHOOK_SECRET"
