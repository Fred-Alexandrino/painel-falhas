name: Check Cobertura
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          from datetime import datetime
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          abertas = [a for a in ativs if (a.get('numeroOS') or '').strip() and a.get('statusOS') not in ('Finalizada','Cancelada')]
          print('total OSs em aberto monitoradas:', len(abertas))
          nunca = [a for a in abertas if not (a.get('ultimaVerificacaoOS') or '').strip()]
          print('nunca verificadas:', len(nunca))
          com_data = [a for a in abertas if (a.get('ultimaVerificacaoOS') or '').strip()]
          agora = datetime.now()
          atrasos = []
          for a in com_data:
              try:
                  dt = datetime.strptime(a['ultimaVerificacaoOS'], '%Y-%m-%dT%H:%M:%S')
                  atrasos.append((agora - dt).total_seconds() / 60)
              except: pass
          if atrasos:
              print('mais antiga (minutos desde ultima checagem):', round(max(atrasos), 1))
              print('media (minutos):', round(sum(atrasos)/len(atrasos), 1))
          " > backups/check-cobertura.txt
          cat backups/check-cobertura.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-cobertura.txt
          git diff --quiet --cached || git commit -m "check cobertura [skip ci]"
          git push
