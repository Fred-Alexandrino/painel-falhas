name: Check 8866 Duplicado
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          from collections import Counter
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') == '8866':
                  print(json.dumps(a, ensure_ascii=False, indent=2))
                  print('---')
          # checar duplicidade geral de numeroOS entre atividades ABERTAS (nao concluidas)
          contagem = Counter(a.get('numeroOS') for a in ativs if a.get('numeroOS') and a.get('status','').lower() not in ('concluído','concluido','cancelado'))
          dups = {k:v for k,v in contagem.items() if v>1}
          print('numeroOS com mais de 1 atividade aberta:', dups)
          " > backups/check8866.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check8866.txt
          git diff --quiet --cached || git commit -m "check 8866 [skip ci]"
          git push
