name: Teste Comunicado Livre
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          echo "=== grupos configurados ===" > backups/teste-comlivre.txt
          curl -s -m 15 "https://api.168.138.232.237.sslip.io/grupos-configurados" >> backups/teste-comlivre.txt
          echo "" >> backups/teste-comlivre.txt
          echo "=== gerar texto ===" >> backups/teste-comlivre.txt
          curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"Manutencao programada amanha","observacoes":"Sistema fora do ar das 8h as 10h pra atualizacao"}' >> backups/teste-comlivre.txt
          cat backups/teste-comlivre.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-comlivre.txt
          git diff --quiet --cached || git commit -m "teste comlivre [skip ci]"
          git push
