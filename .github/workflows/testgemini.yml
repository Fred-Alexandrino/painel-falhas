name: Test Gemini Outro Endpoint
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/gerar-texto-os-ia" \
            -H "Content-Type: application/json" \
            -d '{"falha":"teste diagnostico","causa":"teste","acao":"teste"}' \
            -o backups/test-gemini-result.json \
            -w "\nHTTP_CODE:%{http_code}\n" --max-time 60
          END=$(date +%s)
          echo "duracao_segundos: $((END-START))" >> backups/test-gemini-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/test-gemini-result.json
          git diff --quiet --cached || git commit -m "test gemini outro endpoint [skip ci]"
          git push
