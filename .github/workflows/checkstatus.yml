name: Check Status Anomalos
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          validos = {'em aberto','concluído','concluido','cancelado','convertida'}
          for a in ativs:
              s = (a.get('status') or '').strip().lower()
              if s and s not in validos:
                  print(repr(a.get('status')), '|', a.get('numeroOS'), '|', a.get('usina'), '|', a.get('statusOS'))
          " > backups/status-anomalos.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/status-anomalos.txt
          git diff --quiet --cached || git commit -m "status anomalos [skip ci]"
          git push
