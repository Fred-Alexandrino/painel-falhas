name: Diagnostico Sync Agora
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sync-fracttal?secret=$WEBHOOK_SECRET" -o backups/sync-agora.json
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/ativ.json
          python3 -c "
          import json
          d = json.load(open('/tmp/ativ.json'))
          ativs = d.get('atividades', [])
          print('total atividades:', len(ativs))
          # mostra as 5 com verificacao mais recente
          com_verif = [a for a in ativs if a.get('ultimaVerificacaoOS')]
          com_verif.sort(key=lambda a: a.get('ultimaVerificacaoOS',''), reverse=True)
          print('=== 10 mais recentemente verificadas ===')
          for a in com_verif[:10]:
              print(a.get('numeroOS'), a.get('ultimaVerificacaoOS'), a.get('statusOS'))
          " > backups/ultimas-verificacoes.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/sync-agora.json backups/ultimas-verificacoes.txt
          git diff --quiet --cached || git commit -m "diagnostico sync agora [skip ci]"
          git push
