name: Debug conclusoes prematuras

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Checar 7962 e 7904 no painel e na Fracttal
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          echo "===== PAINEL =====" > backups/check-status-result.txt
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          for a in d.get('atividades', []):
              if a.get('numeroOS') in ('7962','7904'):
                  print(a.get('numeroOS'), '|status=', a.get('status'), '|statusOS=', a.get('statusOS'), '|pct=', a.get('percentualOS'))
          " >> backups/check-status-result.txt
          echo "" >> backups/check-status-result.txt
          echo "===== FRACTTAL 7962 =====" >> backups/check-status-result.txt
          curl -s "$BASE/fracttal-raw?folio=7962" -H "X-Webhook-Secret: $WEBHOOK_SECRET" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          t = d['body']['data'][0]
          print('id_status_work_order:', t.get('id_status_work_order'))
          " >> backups/check-status-result.txt
          echo "===== FRACTTAL 7904 =====" >> backups/check-status-result.txt
          curl -s "$BASE/fracttal-raw?folio=7904" -H "X-Webhook-Secret: $WEBHOOK_SECRET" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          t = d['body']['data'][0]
          print('id_status_work_order:', t.get('id_status_work_order'))
          " >> backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Debug conclusoes prematuras [skip ci]"
          git push
