name: Listar Grupos WhatsApp
on:
  workflow_dispatch: {}
jobs:
  l:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://wppconnect-painel.onrender.com/grupos" --max-time 30 -o backups/lista-grupos.json
          cat backups/lista-grupos.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/lista-grupos.json
          git diff --quiet --cached || git commit -m "listar grupos [skip ci]"
          git push
