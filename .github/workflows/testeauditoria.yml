name: Teste Auditoria Completa
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/auditoria-consistencia-os?apply=true" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/auditoria-completa-result.json --max-time 60
          END=$(date +%s)
          echo "" >> backups/auditoria-completa-result.json
          echo "duracao_segundos: $((END-START))" >> backups/auditoria-completa-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/auditoria-completa-result.json
          git diff --quiet --cached || git commit -m "teste auditoria completa [skip ci]"
          git push
