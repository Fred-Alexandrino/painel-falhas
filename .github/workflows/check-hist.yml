name: Check Historico OS

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Ver historico da OS 9035
        run: |
          BASE="https://whatsapp-painel-falhas.onrender.com"
          mkdir -p backups
          curl -s "$BASE/atividades" -o /tmp/ativs.json
          python3 -c "
          import json
          d = json.load(open('/tmp/ativs.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if a.get('numeroOS') == '9035':
                  print('numeroOS:', a.get('numeroOS'))
                  print('historico:')
                  print(a.get('historico'))
          " > backups/check-hist-result.txt
          cat backups/check-hist-result.txt
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-hist-result.txt
          git diff --quiet --cached || git commit -m "Debug historico OS 9035 [skip ci]"
          git push
