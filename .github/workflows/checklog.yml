name: Check Log Mensagens
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://api.168.138.232.237.sslip.io/health" -o backups/health-check.json
          cat backups/health-check.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/health-check.json
          git diff --quiet --cached || git commit -m "check log [skip ci]"
          git push
