name: Criar Monitor UptimeRobot

on:
  workflow_dispatch: {}

jobs:
  criar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Criar monitor no UptimeRobot
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://api.uptimerobot.com/v2/newMonitor" \
            --data-urlencode "api_key=$UPTIMEROBOT_API_KEY" \
            --data-urlencode "format=json" \
            --data-urlencode "type=1" \
            --data-urlencode "url=https://whatsapp-painel-falhas.onrender.com/sync-fracttal?secret=$WEBHOOK_SECRET" \
            --data-urlencode "friendly_name=Sync Fracttal 30min" \
            --data-urlencode "interval=1800" \
            -o backups/uptimerobot-result.json
      - name: Salvar resultado
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/uptimerobot-result.json
          git diff --quiet --cached || git commit -m "Criar monitor UptimeRobot [skip ci]"
          git push
