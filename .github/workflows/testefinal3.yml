name: Teste Final Papeis Invertidos
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          echo "=== Atualizar OS (varredura status do que ja existe) ===" > backups/teste-final3.txt
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" -o /tmp/r1.json --max-time 45
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('/tmp/r1.json'))
          print('ok:', d.get('ok'), '| divergencias:', d.get('total_divergencias'), '| desatualizadas:', d.get('total_desatualizadas'), '| revalidadas:', len(d.get('revalidadas_ao_vivo',[])))
          " >> backups/teste-final3.txt
          echo "duracao: $((END-START))s" >> backups/teste-final3.txt
          echo "" >> backups/teste-final3.txt
          echo "=== Auditoria completa (descoberta + varredura ampla) ===" >> backups/teste-final3.txt
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/rodar-auditoria-agora" -o /tmp/r2.json --max-time 60
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('/tmp/r2.json'))
          print('ok:', d.get('ok'))
          desc = d.get('descoberta', {})
          cons = d.get('consistencia', {})
          print('descoberta - criadas:', len(desc.get('criadas',[])), '| revisao_manual:', len(desc.get('revisao_manual',[])))
          print('consistencia - divergencias:', cons.get('total_divergencias'), '| desatualizadas:', cons.get('total_desatualizadas'), '| revalidadas:', len(cons.get('revalidadas_ao_vivo',[])))
          " >> backups/teste-final3.txt
          echo "duracao: $((END-START))s" >> backups/teste-final3.txt
          cat backups/teste-final3.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-final3.txt
          git diff --quiet --cached || git commit -m "teste final 3 [skip ci]"
          git push
