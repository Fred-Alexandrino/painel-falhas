name: Dry Run Comunicados
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/enviar-comunicados-diarios?dry_run=true" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/dryrun-comunicados.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/dryrun-comunicados.json
          git diff --quiet --cached || git commit -m "dry run comunicados [skip ci]"
          git push
