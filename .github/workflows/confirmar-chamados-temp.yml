name: Confirmar Chamados (temp)
on:
  workflow_dispatch: {}
jobs:
  confirmar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/chamados-fabricante" -o backups/chamados-final-check.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/chamados-final-check.json
          git diff --quiet --cached || git commit -m "check final chamados [skip ci]"
          git push
