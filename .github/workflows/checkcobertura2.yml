name: Check Cobertura 2
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          abertas = [a for a in ativs if (a.get('numeroOS') or '').strip() and a.get('statusOS') not in ('Finalizada','Cancelada')]
          for a in abertas[:5]:
              print(repr(a.get('ultimaVerificacaoOS')))
          " > backups/check-cobertura2.txt
          cat backups/check-cobertura2.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-cobertura2.txt
          git diff --quiet --cached || git commit -m "check cobertura2 [skip ci]"
          git push
