name: Check Sete Lagoas
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          for a in ativs:
              if 'sete lagoas' in (a.get('usina','') or '').lower() or 'sete lagoas' in (a.get('descricao','') or '').lower():
                  print(repr(a.get('usina')), '|', repr(a.get('cliente')), '|', a.get('status'), '|', a.get('statusOS'), '|', a.get('numeroOS'))
          " > backups/check-sete.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-sete.txt
          git diff --quiet --cached || git commit -m "check sete lagoas [skip ci]"
          git push
