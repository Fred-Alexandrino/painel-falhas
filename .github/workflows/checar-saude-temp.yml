name: Checar Saude Pos Deploy (temp)
on:
  workflow_dispatch: {}
jobs:
  checar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/health" -o backups/saude_pos_deploy.json
          curl -s "https://api.168.138.232.237.sslip.io/chamados-fabricante" | python3 -c "import json,sys; d=json.load(sys.stdin); print('total chamados:', d.get('total')); print('tem NotaDashboard:', 'NotaDashboard' in d['itens'][0] if d.get('itens') else 'sem itens')" > backups/saude_chamados.txt
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/saude_pos_deploy.json backups/saude_chamados.txt
          git diff --quiet --cached || git commit -m "check saude pos deploy [skip ci]"
          git push
