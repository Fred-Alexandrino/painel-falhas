name: Teste Verificar Individual
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/verificar-uma-os" \
            -H "Content-Type: application/json" \
            -d '{"numeroOS":"9097"}' \
            -o backups/teste-individual.json --max-time 20
          cat backups/teste-individual.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-individual.json
          git diff --quiet --cached || git commit -m "teste individual [skip ci]"
          git push
