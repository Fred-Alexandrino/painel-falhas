name: Conferir Ativ 179 (temp)
on:
  workflow_dispatch: {}
jobs:
  conferir:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/atividades" -o backups/conferir_179.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/conferir_179.json
          git diff --quiet --cached || git commit -m "conferir ativ 179 [skip ci]"
          git push
