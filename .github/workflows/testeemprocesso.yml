name: Teste Regra Em Processo
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/enviar-comunicados-diarios?dry_run=true" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 60 -o backups/teste-emprocesso.json
          python3 -c "
          import json
          d = json.load(open('backups/teste-emprocesso.json'))
          print('ok:', d.get('ok'))
          print('enviados:', len(d.get('enviados',[])))
          print('erros:', d.get('erros'))
          " > backups/resumo-emprocesso.txt
          cat backups/resumo-emprocesso.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resumo-emprocesso.txt
          git diff --quiet --cached || git commit -m "teste em processo [skip ci]"
          git push
