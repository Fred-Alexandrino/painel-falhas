name: Resolver Duplicata 8866
on:
  workflow_dispatch: {}
jobs:
  r:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/resolver-duplicata-8866" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/resolver-8866-result.json
          cat backups/resolver-8866-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resolver-8866-result.json
          git diff --quiet --cached || git commit -m "resolver 8866 [skip ci]"
          git push
