name: Diag4
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: Rodar testes e gravar via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "=== forcando chave de teste ==="
            curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste"}'
            echo ""
            echo "=== chamada normal ==="
            curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"teste diagnostico"}'
          } > resultado.txt
          CONTENT=$(base64 -w0 resultado.txt)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/backups/diag4.txt" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          python3 -c "
          import json
          payload = {'message': 'diag4 result [skip ci]', 'content': '$CONTENT', 'branch': 'main'}
          if '$SHA':
              payload['sha'] = '$SHA'
          print(json.dumps(payload))
          " > payload.json
          curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/backups/diag4.txt" \
            -d @payload.json
