name: Check Piggyback 2
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sync-fracttal?secret=$WEBHOOK_SECRET" -o backups/check-piggyback2.json --max-time 90
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-piggyback2.json
          git diff --quiet --cached || git commit -m "check piggyback2 [skip ci]"
          git push
