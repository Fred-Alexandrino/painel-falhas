name: Buscar Crateus (temp)
on:
  workflow_dispatch: {}
jobs:
  buscar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://api.168.138.232.237.sslip.io/atividades" -o backups/atividades-full.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/atividades-full.json
          git diff --quiet --cached || git commit -m "diag crateus [skip ci]"
          git push
