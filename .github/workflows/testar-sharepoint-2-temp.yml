name: Testar Link SharePoint 2 (temp)
on:
  workflow_dispatch: {}
jobs:
  testar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -L "https://gridcobr.sharepoint.com/:x:/s/GRIDCO/IQB64AH7qFdbT7z3bz2Sc_kzAWcF0so1GpYHFa6Ch4QILBY?e=KwGd2w&download=1" -o backups/teste2_download.bin
          echo "=== Tipo de arquivo detectado ===" > backups/teste2_info.txt
          file backups/teste2_download.bin >> backups/teste2_info.txt
          echo "=== Tamanho ===" >> backups/teste2_info.txt
          wc -c backups/teste2_download.bin >> backups/teste2_info.txt
          echo "=== Primeiros 500 caracteres ===" >> backups/teste2_info.txt
          head -c 500 backups/teste2_download.bin >> backups/teste2_info.txt
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/teste2_info.txt
          git diff --quiet --cached || git commit -m "teste link sharepoint 2 [skip ci]"
          git push
