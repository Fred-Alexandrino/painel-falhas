name: Teste Final Botoes Separados
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          echo "=== Atualizar OS (so descoberta) ===" > backups/teste-final2.txt
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-os-agora" -o /tmp/r1.json --max-time 40
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('/tmp/r1.json'))
          print('ok:', d.get('ok'), '| criadas:', len(d.get('criadas',[])), '| revisao_manual:', len(d.get('revisao_manual',[])))
          " >> backups/teste-final2.txt
          echo "duracao: $((END-START))s" >> backups/teste-final2.txt
          echo "" >> backups/teste-final2.txt
          echo "=== Auditoria (so rechecagem) ===" >> backups/teste-final2.txt
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/rodar-auditoria-agora" -o /tmp/r2.json --max-time 40
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('/tmp/r2.json'))
          print('ok:', d.get('ok'), '| divergencias:', d.get('total_divergencias'), '| desatualizadas:', d.get('total_desatualizadas'), '| revalidadas:', len(d.get('revalidadas_ao_vivo',[])))
          " >> backups/teste-final2.txt
          echo "duracao: $((END-START))s" >> backups/teste-final2.txt
          cat backups/teste-final2.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/teste-final2.txt
          git diff --quiet --cached || git commit -m "teste final 2 [skip ci]"
          git push
