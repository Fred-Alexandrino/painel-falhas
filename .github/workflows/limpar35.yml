name: Limpar numeroOS 35
on:
  workflow_dispatch: {}
jobs:
  l:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"id":"35","field":"numeroOS","value":""}' \
            -o backups/limpar35-result.json
          cat backups/limpar35-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/limpar35-result.json
          git diff --quiet --cached || git commit -m "limpar 35 [skip ci]"
          git push
