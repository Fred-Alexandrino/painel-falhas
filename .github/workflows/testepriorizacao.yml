name: Teste Priorizacao IA
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sugerir-priorizacao-diaria" --max-time 60 -o backups/teste-priorizacao.json
          python3 -c "
          import json
          d = json.load(open('backups/teste-priorizacao.json'))
          print('ok:', d.get('ok'))
          if not d.get('ok'):
              print('erro:', d.get('error'))
          else:
              print('total_atividades:', d.get('total_atividades'))
              print('resumo_executivo:', d.get('resumo_executivo'))
              print('qtd prioridades:', len(d.get('prioridades',[])))
              print()
              print('top 5:')
              for p in d.get('prioridades',[])[:5]:
                  print(' ', p.get('posicao'), '|', p.get('usina'), '|', p.get('equipamento'), '|', p.get('motivo'))
              print()
              print('mensagem_pronta (primeiros 500 chars):')
              print(d.get('mensagem_pronta','')[:500])
          " > backups/resumo-priorizacao.txt
          cat backups/resumo-priorizacao.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resumo-priorizacao.txt
          git diff --quiet --cached || git commit -m "teste priorizacao [skip ci]"
          git push
