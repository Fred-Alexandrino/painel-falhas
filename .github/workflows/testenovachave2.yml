name: Teste Nova Chave 2
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHAVE: ${{ secrets.GEMINI_TESTE_NOVA_CHAVE }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          R=$(curl -s -m 30 -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=$CHAVE" -H "Content-Type: application/json" -d '{"contents":[{"parts":[{"text":"Responda so a palavra OK"}]}]}')
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "TESTECHAVENOVA2=[$(echo "$R" | head -c 500 | tr '\n' ' ')]"
          git push
