name: Check 9104-9107

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Checar
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://api.168.138.232.237.sslip.io"
          mkdir -p backups
          curl -s "$BASE/atividades" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          for a in d.get('atividades', []):
              if a.get('numeroOS') in ('9104','9105','9106','9107'):
                  print(a.get('numeroOS'), '| status=', a.get('status'), '| statusOS=', a.get('statusOS'), '| pct=', a.get('percentualOS'), '| ultimaVerif=', a.get('ultimaVerificacaoOS'))
          " > backups/check-status-result.txt
          cat backups/check-status-result.txt
      - name: Salvar
        if: always()
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/check-status-result.txt
          git diff --quiet --cached || git commit -m "Check 9104-9107 [skip ci]"
          git push
