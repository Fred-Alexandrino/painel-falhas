name: Sync Fracttal -> Painel de Atividades

on:
  schedule:
    - cron: '*/30 * * * *'   # a cada 30 minutos
  workflow_dispatch: {}      # permite disparo manual pelo Fred, se precisar

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Chamar /sync-fracttal no backend
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          BASE="https://api.168.138.232.237.sslip.io"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$BASE/sync-fracttal" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "Status HTTP: $STATUS"
          echo "Resposta: $BODY"

          mkdir -p backups
          {
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Status HTTP: $STATUS"
            echo "Resposta:"
            echo "$BODY"
          } > backups/last-sync-fracttal.txt

          if [ "$STATUS" -ge 400 ]; then
            echo "::warning::sync-fracttal retornou erro $STATUS"
          fi

      - name: Salvar resultado no repositório
        run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/last-sync-fracttal.txt
          git diff --quiet --cached || git commit -m "Resultado do sync Fracttal [skip ci]"
          git push
