name: Corrigir Ativo Chamados (temp)
on:
  workflow_dispatch: {}
jobs:
  corrigir:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          curl -s -X POST "https://api.168.138.232.237.sslip.io/corrigir-ativo-chamado" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d '{"correcoes":[
              {"ticket":"26445","ufv":"Thopen - Matão 1","novoAtivo":"tracker"},
              {"ticket":"7027932","ufv":"Renogrid - Elias Fausto","novoAtivo":"Inversor"},
              {"ticket":"7028010","ufv":"Renogrid - Nova Xavantina 2","novoAtivo":"Inversor"}
            ]}' \
            -o backups/correcao_ativo_resultado.json
      - run: |
          git config user.name "fix-bot"
          git config user.email "actions@github.com"
          git add backups/correcao_ativo_resultado.json
          git diff --quiet --cached || git commit -m "resultado correcao ativo [skip ci]"
          git push
