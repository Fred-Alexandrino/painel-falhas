name: Check Trava Comunicados
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/config-ler" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -o backups/trava-comunicados.json
          cat backups/trava-comunicados.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/trava-comunicados.json
          git diff --quiet --cached || git commit -m "check trava [skip ci]"
          git push
