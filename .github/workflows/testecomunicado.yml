name: Teste Comunicado Revalidado
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/enviar-comunicados-diarios?dry_run=true" -H "X-Webhook-Secret: $WEBHOOK_SECRET" --max-time 90 -o backups/teste-comunicado.json
          END=$(date +%s)
          python3 -c "
          import json
          d = json.load(open('backups/teste-comunicado.json'))
          print('ok:', d.get('ok'))
          print('enviados (usinas com atividades):', len(d.get('enviados',[])))
          print('pulados:', len(d.get('pulados',[])))
          print('erros:', d.get('erros'))
          " > backups/resumo-comunicado.txt
          echo \"duracao: \$((END-START))s\" >> backups/resumo-comunicado.txt
          cat backups/resumo-comunicado.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resumo-comunicado.txt
          git diff --quiet --cached || git commit -m "teste comunicado revalidado [skip ci]"
          git push
