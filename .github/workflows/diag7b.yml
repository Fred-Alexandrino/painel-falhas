name: Diag7b
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Rodar testes e gravar em Gist
        run: |
          {
            echo "=== forcando chave de teste ==="
            curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste"}'
            echo ""
            echo "=== chamada normal ==="
            curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"teste diagnostico"}'
          } > resultado.txt
          cat resultado.txt
          python3 << 'PYEOF'
          import json, urllib.request, os
          content = open('resultado.txt').read()
          payload = json.dumps({
              'description': 'diag gemini',
              'public': False,
              'files': {'diag.txt': {'content': content}}
          }).encode()
          req = urllib.request.Request(
              "https://api.github.com/gists",
              data=payload, method='POST',
              headers={'Authorization': f"token {os.environ['GH_TOKEN']}", 'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          d = json.loads(resp.read().decode())
          print('GIST_URL:', d.get('html_url'))
          print('RAW_URL:', d['files']['diag.txt']['raw_url'])
          PYEOF
