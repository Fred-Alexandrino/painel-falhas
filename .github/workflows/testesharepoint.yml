name: Teste SharePoint Link
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -sL -o backups/sharepoint-teste.bin -w "HTTP_CODE:%{http_code}\nCONTENT_TYPE:%{content_type}\nSIZE:%{size_download}\n" "https://gridcobr.sharepoint.com/:x:/s/GRIDCO/IQB64AH7qFdbT7z3bz2Sc_kzAWcF0so1GpYHFa6Ch4QILBY?e=G3FCwF" > backups/sharepoint-resultado.txt
          cat backups/sharepoint-resultado.txt
          echo "--- primeiros bytes do arquivo baixado ---" >> backups/sharepoint-resultado.txt
          head -c 300 backups/sharepoint-teste.bin >> backups/sharepoint-resultado.txt 2>&1 || true
          cat backups/sharepoint-resultado.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/sharepoint-resultado.txt
          git diff --quiet --cached || git commit -m "teste sharepoint [skip ci]"
          git push
