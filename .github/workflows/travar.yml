name: Travar Fuso
on:
  workflow_dispatch: {}
jobs:
  travar:
    runs-on: ubuntu-latest
    steps:
      - name: Ativar trava
        env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          curl -s "https://whatsapp-painel-falhas.onrender.com/travar-fuso-retroativo" -H "X-Webhook-Secret: $WEBHOOK_SECRET"
