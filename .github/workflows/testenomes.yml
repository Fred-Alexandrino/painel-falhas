name: Teste Nomes Grupos
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s -m 15 "https://api.168.138.232.237.sslip.io/grupos-configurados" -o backups/teste-nomes.json
          python3 -c "
          import json
          d = json.load(open('backups/teste-nomes.json'))
          for it in d.get('itens',[]):
              print(it['nome'])
          " > backups/resumo-nomes.txt
          cat backups/resumo-nomes.txt
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/resumo-nomes.txt
          git diff --quiet --cached || git commit -m "teste nomes [skip ci]"
          git push
