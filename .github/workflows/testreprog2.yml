name: Test Reprog Pequeno
on:
  workflow_dispatch:
    inputs:
      qtd:
        description: 'quantidade de ids a testar'
        required: true
        default: '10'
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://whatsapp-painel-falhas.onrender.com/atividades" -o /tmp/a.json
          python3 -c "
          import json
          d = json.load(open('/tmp/a.json'))
          ativs = d.get('atividades', [])
          abertas = [a for a in ativs if (a.get('status','') or '').lower() not in ('concluído','concluido','cancelado')]
          ids = [a['id'] for a in abertas][:${{ github.event.inputs.qtd }}]
          print('total ids testados:', len(ids))
          json.dump({'ids': ids}, open('/tmp/payload.json','w'))
          "
          START=$(date +%s)
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/sugerir-reprogramacao" \
            -H "Content-Type: application/json" \
            --data @/tmp/payload.json \
            -o backups/test-reprog2-result.json \
            -w "\nHTTP_CODE:%{http_code}\n" --max-time 170
          END=$(date +%s)
          echo "duracao_real_segundos: $((END-START))" >> backups/test-reprog2-result.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/test-reprog2-result.json
          git diff --quiet --cached || git commit -m "test reprog pequeno [skip ci]"
          git push
