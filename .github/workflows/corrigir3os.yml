name: Corrigir DataConclusao 3 OS
on:
  workflow_dispatch: {}
jobs:
  c:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          WEBHOOK_SECRET: ${{ secrets.FALHAS_WEBHOOK_SECRET }}
        run: |
          mkdir -p backups
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" -d '{"id":"118","field":"dataConclusao","value":"13/07/2026 14:44:00"}' -o backups/fix118.json
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" -d '{"id":"126","field":"dataConclusao","value":"13/07/2026 12:25:00"}' -o backups/fix126.json
          curl -s -X POST "https://whatsapp-painel-falhas.onrender.com/atualizar-campo-atividade" -H "X-Webhook-Secret: $WEBHOOK_SECRET" -H "Content-Type: application/json" -d '{"id":"129","field":"dataConclusao","value":"12/07/2026 12:35:00"}' -o backups/fix129.json
          cat backups/fix118.json backups/fix126.json backups/fix129.json
      - run: |
          git config user.name "sync-fracttal-bot"
          git config user.email "actions@github.com"
          git add backups/fix118.json backups/fix126.json backups/fix129.json
          git diff --quiet --cached || git commit -m "corrigir 3 os [skip ci]"
          git push
