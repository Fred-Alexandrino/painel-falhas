name: Checar Ticket Antigo (temp)
on:
  workflow_dispatch: {}
jobs:
  checar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://docs.google.com/spreadsheets/d/1VLo8__wxSJVWiUIFd_JTcOnadJlUt440i1M1pC0ehTs/gviz/tq?tqx=out:json&gid=0&headers=1&tq=select%20*" -o backups/painel_falhas_raw.txt
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/painel_falhas_raw.txt
          git diff --quiet --cached || git commit -m "check ticket antigo [skip ci]"
          git push
