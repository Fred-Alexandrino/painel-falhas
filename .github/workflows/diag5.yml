name: Diag5
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rodar testes e gravar via API
        run: |
          {
            echo "=== forcando chave de teste ==="
            curl -s -m 30 -X POST "https://api.168.138.232.237.sslip.io/gerar-texto-os-ia?diagnostico=true" -H "Content-Type: application/json" -d '{"falha":"teste"}'
            echo ""
            echo "=== chamada normal ==="
            curl -s -m 40 -X POST "https://api.168.138.232.237.sslip.io/gerar-comunicado-livre-ia" -H "Content-Type: application/json" -d '{"tema":"teste diagnostico"}'
          } > resultado.txt
          cat resultado.txt
          CONTENT=$(base64 -w0 resultado.txt)
          python3 -c "
          import json
          payload = {'message': 'diag5 result [skip ci]', 'content': '$CONTENT', 'branch': 'main'}
          print(json.dumps(payload))
          " > payload.json
          curl -s -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/backups/diag5.txt" \
            -d @payload.json
