name: Listar Status Chamados (temp)
on:
  workflow_dispatch: {}
jobs:
  listar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.168.138.232.237.sslip.io/chamados-fabricante" -o backups/chamados_status_check.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/chamados_status_check.json
          git diff --quiet --cached || git commit -m "check status chamados [skip ci]"
          git push
