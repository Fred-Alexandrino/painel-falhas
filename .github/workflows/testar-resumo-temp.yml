name: Testar Resumo Widget (temp)
on:
  workflow_dispatch: {}
jobs:
  testar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p backups
          curl -s "https://api.168.138.232.237.sslip.io/resumo" -o backups/teste_resumo.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add backups/teste_resumo.json
          git diff --quiet --cached || git commit -m "teste resumo [skip ci]"
          git push
